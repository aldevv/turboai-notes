services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # bind-mount the db file so data persists across container rebuilds
      - ./backend/db.sqlite3:/app/db.sqlite3
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_API_BASE is baked into the build — override here if needed
        NEXT_PUBLIC_API_BASE: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
